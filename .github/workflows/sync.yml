name: Sync Fork

on:
  schedule:
    - cron: "0 */6 * * *" 
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ANU_TOKEN }}

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/m-lab/mlab-speedtest.git
          git fetch upstream

      - name: Merge upstream
        run: |
          git merge upstream/main --allow-unrelated-histories || true

      - name: Restore vercel config
        run: |
          git checkout HEAD -- vercel.json || true

      - name: Push changes
        run: |
          git push origin main
